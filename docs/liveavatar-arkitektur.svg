<svg width="680" viewBox="0 0 680 248" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
<title>Arkitektur for interaktiv LiveAvatar digital visning</title>
<desc>Kjøper snakker med en LiveAvatar-videoavatar (HeyGen) som sender tale-til-tekst til vår egen LLM-adapter. Adapteren henter relevante utdrag fra kunnskapsbasen (Supabase pgvector, bygget fra salgsoppgave og tilstandsrapport) og lar Claude lage et kort norsk svar, som leses opp av avataren med meglerens egen stemme.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="248" fill="#ffffff"/>

<text x="40" y="22" font-size="14" font-weight="600" fill="#2C2C2A">Sanntids-samtale</text>

<rect x="40" y="34" width="104" height="58" rx="8" fill="#F1EFE8" stroke="#888780"/>
<text x="92" y="60" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Kjøper</text>
<text x="92" y="78" font-size="12" fill="#5F5E5A" text-anchor="middle">i nettleseren</text>

<rect x="188" y="34" width="206" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7"/>
<text x="291" y="60" font-size="14" font-weight="500" fill="#3C3489" text-anchor="middle">LiveAvatar (HeyGen)</text>
<text x="291" y="78" font-size="12" fill="#534AB7" text-anchor="middle">video + tale i sanntid</text>

<rect x="438" y="34" width="202" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="539" y="60" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Vår hjerne</text>
<text x="539" y="78" font-size="12" fill="#0F6E56" text-anchor="middle">egen LLM-adapter</text>

<line x1="150" y1="52" x2="182" y2="52" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="182" y1="74" x2="150" y2="74" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="400" y1="52" x2="432" y2="52" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="432" y1="74" x2="400" y2="74" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="490" y1="92" x2="490" y2="150" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="594" y1="92" x2="594" y2="150" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<text x="40" y="128" font-size="14" font-weight="600" fill="#2C2C2A">Kunnskap som grunnlag</text>

<rect x="40" y="152" width="170" height="56" rx="8" fill="#F1EFE8" stroke="#888780"/>
<text x="125" y="176" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Salgsoppgave</text>
<text x="125" y="194" font-size="12" fill="#5F5E5A" text-anchor="middle">+ tilstandsrapport (PDF)</text>

<rect x="248" y="152" width="118" height="56" rx="8" fill="#F1EFE8" stroke="#888780"/>
<text x="307" y="176" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Embeddings</text>
<text x="307" y="194" font-size="12" fill="#5F5E5A" text-anchor="middle">biter av tekst</text>

<rect x="438" y="152" width="104" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="490" y="176" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Kunnskapsbase</text>
<text x="490" y="194" font-size="12" fill="#0F6E56" text-anchor="middle">pgvector</text>

<rect x="548" y="152" width="92" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="594" y="176" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Claude</text>
<text x="594" y="194" font-size="12" fill="#0F6E56" text-anchor="middle">haiku</text>

<line x1="210" y1="180" x2="244" y2="180" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="366" y1="180" x2="434" y2="180" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="226" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7"/>
<text x="60" y="237" font-size="12" fill="#5F5E5A">HeyGen-plattform</text>
<rect x="210" y="226" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="230" y="237" font-size="12" fill="#5F5E5A">Vårt (RAG + Claude)</text>
<rect x="400" y="226" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#888780"/>
<text x="420" y="237" font-size="12" fill="#5F5E5A">Data / bruker</text>
</svg>
