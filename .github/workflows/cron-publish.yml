name: Publish Scheduled Videos

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger publish cron
        run: |
          curl -s -X POST "https://reelhome.ai/api/cron/publish-scheduled" \
            --max-time 60
